name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Use pinned npm version
        run: npm install --global npm@11.13.0

      - name: Install dependencies
        run: npm ci

      - name: Lint web app
        run: npm run lint:web

      - name: Build web app
        run: npm run build:web

  database:
    name: Database migrations and types
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - name: Use pinned npm version
        run: npm install --global npm@11.13.0

      - name: Install dependencies
        run: npm ci

      - name: Start local Supabase
        id: supabase_start
        run: npx supabase start >/dev/null

      - name: Rebuild local database
        run: npx supabase db reset --local

      - name: Test database access control
        run: npx supabase test db

      - name: Lint database schema
        run: npx supabase db lint --local --fail-on error

      - name: Check migration drift
        shell: bash
        run: |
          diff_result="$(mktemp)"
          npx supabase db diff --local --schema public,private --output-format json > "$diff_result"
          node - "$diff_result" <<'NODE'
          const fs = require('node:fs')

          const resultPath = process.argv[2]
          const result = JSON.parse(fs.readFileSync(resultPath, 'utf8'))
          const schemaDiff = (result.diff ?? '').trim()

          if (schemaDiff) {
            console.error('Schema drift detected. Commit a migration for these changes:')
            console.error(schemaDiff)
            process.exit(1)
          }

          console.log('No schema drift detected.')
          NODE

      - name: Regenerate database types
        run: |
          npx supabase gen types typescript --local > apps/web/src/types/database.types.ts
          node -e "const fs = require('node:fs'); const file = 'apps/web/src/types/database.types.ts'; fs.writeFileSync(file, fs.readFileSync(file, 'utf8').replace(/\n\n$/, '\n'))"

      - name: Verify generated database types
        run: git diff --exit-code -- apps/web/src/types/database.types.ts

      - name: Stop local Supabase
        if: ${{ always() && steps.supabase_start.outcome != 'skipped' }}
        run: npx supabase stop
